[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

; ── Redis ─────────────────────────────────────────────────────────────────────
[program:redis]
command=redis-server --bind 127.0.0.1 --port 6379 --daemonize no
autostart=true
autorestart=true
priority=1
stdout_logfile=/var/log/supervisor/redis.log
stderr_logfile=/var/log/supervisor/redis.log

; ── FastAPI ───────────────────────────────────────────────────────────────────
[program:fastapi]
command=uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
directory=/app
autostart=true
autorestart=true
priority=10
startretries=5
startsecs=3
stdout_logfile=/var/log/supervisor/fastapi.log
stderr_logfile=/var/log/supervisor/fastapi.log

; ── Celery Worker ─────────────────────────────────────────────────────────────
[program:celery-worker]
command=celery -A app.celery_app worker --loglevel=info --concurrency=2 -n worker@%%h
directory=/app
autostart=true
autorestart=true
priority=20
startretries=5
startsecs=5
stdout_logfile=/var/log/supervisor/celery-worker.log
stderr_logfile=/var/log/supervisor/celery-worker.log

; ── Celery Beat ───────────────────────────────────────────────────────────────
[program:celery-beat]
command=celery -A app.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
directory=/app
autostart=true
autorestart=true
priority=30
startretries=5
startsecs=5
stdout_logfile=/var/log/supervisor/celery-beat.log
stderr_logfile=/var/log/supervisor/celery-beat.log
