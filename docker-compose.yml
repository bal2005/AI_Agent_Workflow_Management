version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_studio_backend
    ports:
      - "8000:8000"     # FastAPI
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    # Override .env values if needed via environment block
    # env_file: ./backend/.env.docker  (already baked in via Dockerfile)
