version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_studio_backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - WORKSPACE_ROOT=/workspace
    volumes:
      # Only the sandbox_data folder is exposed — safe and controlled
      - ./sandbox_data:/workspace
